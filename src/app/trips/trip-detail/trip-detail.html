<div class="row">
    <div class="col-xs-12">
        <h1>{{ trip.name }}</h1>
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        <div class="btn-group" appDropdown>
            <button type="button" class="btn btn-primary dropdown-toggle">Manage Trip <span class="caret"></span></button>
            <ul class="dropdown-menu">
                <li><a style="cursor: pointer;" (click)="onEditTrip()">Edit Trip</a></li>
                <li><a style="cursor: pointer;" (click)="onDeleteTrip()">Delete Trip</a></li>

            </ul>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-xs-12">
        {{ trip.startDate }} - {{ trip.endDate }}
    </div>
</div>
